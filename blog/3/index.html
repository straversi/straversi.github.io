        <div class="currently-playing-info">

      <button onclick="beginTrashPickup()">Run garbage collector</button>
      <script src="/blog/javascript/currently-playing.js?v=1.4"></script>
      <script>
        (function () {
          const bodySrc = '/blog/assets/song-widget/body.png?v=2';
          const headGifs = [
            'head-flick.gif',
            'head-jam.gif',
            'head-orbit.gif',
            'head-rubber.gif',
            'head-sway.gif',
          ];
          const headSrc = '/blog/assets/song-widget/' + headGifs[Math.floor(Math.random() * headGifs.length)];

          function appendCharacter(wrap) {
            if (!wrap.querySelector('.currently-playing-body')) {
              const body = document.createElement('img');
              body.className = 'currently-playing-body';
              body.src = bodySrc;
              body.alt = '';
              wrap.appendChild(body);
            }

            if (!wrap.querySelector('.currently-playing-head')) {
              const head = document.createElement('img');
              head.className = 'currently-playing-head';
              head.src = headSrc;
              head.alt = '';
              wrap.appendChild(head);
            }
          }

          function decorateArt(container) {
            const art = container.querySelector('.currently-playing-art');
            if (!art) return;

            let wrap = art.closest('.currently-playing-art-wrap');
            if (!wrap) {
              wrap = document.createElement('div');
              wrap.className = 'currently-playing-art-wrap';
              art.parentNode.insertBefore(wrap, art);
              wrap.appendChild(art);
            }

            appendCharacter(wrap);
          }

          const container = document.getElementById('currently-playing');
          if (!container) return;

          const skeletonWrap = container.querySelector('.currently-playing-art-wrap');
          if (skeletonWrap) appendCharacter(skeletonWrap);

          const observer = new MutationObserver(function () {
            decorateArt(container);
          });
          observer.observe(container, { childList: true, subtree: true });
          decorateArt(container);
        })();
      </script>
